<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Pet</title>
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Clínica veterinária Pet</h1>
        <div class="main-content">
            <div class="form-container">
                <h2>Novo Agendamento</h2>
                <form id="agendamentoForm"></form>
                <div class="form-group">
                    <label>Tutor</label>
                    <input type="text" id="nomeTutor">
                </div>
                
                <div class="form-group">
                    <label>Cpf</label>
                    <input type="text" id="cpfTutor"> 
                </div>

                <div class="form-group">
                    <label>Telefone</label>
                    <input type="text" id="telefoneTutor">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="emailTutor">
                </div>
            </div> 
        </div>
    </div>
</body>
</html>
